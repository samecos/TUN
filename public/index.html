<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TUN - AI 服务网关</title>
  <meta name="description" content="内网 AI 服务代理网关">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <!-- 登录层 -->
    <div id="login-screen" class="screen active">
      <div class="login-container">
        <div class="login-logo">
          <div class="logo-icon">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="24" cy="24" r="22" stroke="url(#grad1)" stroke-width="2.5"/>
              <path d="M16 20C16 20 20 28 24 28C28 28 32 20 32 20" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
              <circle cx="18" cy="18" r="2" fill="url(#grad2)"/>
              <circle cx="30" cy="18" r="2" fill="url(#grad2)"/>
              <defs>
                <linearGradient id="grad1" x1="0" y1="0" x2="48" y2="48">
                  <stop stop-color="#6366f1"/>
                  <stop offset="1" stop-color="#a78bfa"/>
                </linearGradient>
                <linearGradient id="grad2" x1="12" y1="12" x2="36" y2="36">
                  <stop stop-color="#818cf8"/>
                  <stop offset="1" stop-color="#c4b5fd"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h1>TUN</h1>
          <p class="login-subtitle">AI 服务网关</p>
        </div>
        <div class="login-form">
          <div class="input-group">
            <input type="text" id="username-input" placeholder="输入你的用户名" autocomplete="off" autofocus>
          </div>
          <button id="login-btn" class="btn-primary">进入</button>
        </div>
      </div>
      <div class="login-bg-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
      </div>
    </div>

    <!-- 主界面 -->
    <div id="main-screen" class="screen">
      <!-- 侧边栏 -->
      <aside id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">TUN</div>
          <span class="sidebar-user" id="sidebar-username"></span>
        </div>

        <div class="sidebar-section">
          <h3 class="sidebar-section-title">选择服务</h3>
          <div id="provider-list" class="provider-list">
            <!-- 动态填充 -->
          </div>
        </div>

        <div class="sidebar-section">
          <h3 class="sidebar-section-title">功能</h3>
          <div id="feature-list" class="feature-list">
            <!-- 动态填充 -->
          </div>
        </div>

        <div class="sidebar-section sidebar-conversations">
          <h3 class="sidebar-section-title">会话历史</h3>
          <div id="conversation-list" class="conversation-list">
            <div class="empty-hint">暂无会话</div>
          </div>
        </div>

        <div class="sidebar-footer">
          <div class="connection-status" id="connection-status">
            <span class="status-dot"></span>
            <span class="status-text">连接中...</span>
          </div>
          <button id="logout-btn" class="btn-text">退出</button>
        </div>
      </aside>

      <!-- 聊天区域 -->
      <main id="chat-area">
        <!-- 欢迎页 -->
        <div id="welcome-view" class="chat-view active">
          <div class="welcome-content">
            <h2>👋 欢迎使用 TUN</h2>
            <p>选择左侧的服务和功能，开始你的 AI 体验</p>
            <div class="welcome-cards" id="welcome-cards">
              <!-- 动态填充 -->
            </div>
          </div>
        </div>

        <!-- 对话页 -->
        <div id="chat-view" class="chat-view">
          <div class="chat-header">
            <div class="chat-header-info">
              <span class="chat-provider-badge" id="chat-provider-badge"></span>
              <span class="chat-feature-name" id="chat-feature-name"></span>
            </div>
            <div class="chat-header-actions">
              <div class="queue-info" id="queue-info" style="display:none">
                <span class="queue-icon">⏳</span>
                <span id="queue-text">排队中...</span>
              </div>
              <button id="new-chat-btn" class="btn-icon" title="新建对话">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="chat-messages" id="chat-messages">
            <!-- 动态消息 -->
          </div>

          <div class="chat-input-area">
            <div class="chat-input-wrapper">
              <textarea id="message-input" placeholder="输入消息..." rows="1"></textarea>
              <button id="send-btn" class="btn-send" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"/>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
              </button>
            </div>
            <div class="chat-input-hint">
              <span>Enter 发送 · Shift+Enter 换行</span>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Markdown 渲染 -->
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <!-- 代码高亮 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark-dimmed.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/common.min.js"></script>

  <script src="/app.js"></script>
</body>
</html>
